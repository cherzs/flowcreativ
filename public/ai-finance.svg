    <circle cx="-317" cy="115" r="4" fill="#fbbf24"/>
    <circle cx="-277" cy="105" r="4" fill="#fbbf24"/>
    <circle cx="-237" cy="120" r="4" fill="#fbbf24"/>
    <circle cx="-197" cy="95" r="4" fill="#fbbf24"/>
    <circle cx="-157" cy="85" r="4" fill="#fbbf24"/>
    <circle cx="-117" cy="100" r="4" fill="#fbbf24"/>
    <circle cx="-77" cy="90" r="4" fill="#fbbf24"/>
    <circle cx="-37" cy="80" r="4" fill="#fbbf24"/>

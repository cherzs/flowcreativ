<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1200" y2="800">
      <stop offset="0%" stop-color="#0F0F23"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="glow1" x1="200" y1="200" x2="500" y2="500">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="glow2" x1="700" y1="100" x2="1000" y2="400">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg1)"/>
  
  <!-- Glow Effects -->
  <circle cx="300" cy="300" r="200" fill="url(#glow1)" filter="url(#blur1)"/>
  <circle cx="900" cy="200" r="150" fill="url(#glow2)" filter="url(#blur1)"/>
  
  <!-- Grid Pattern -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
    <line x1="100" y1="0" x2="100" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/>
    <line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/>
    <line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/>
    <line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/>
    <line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
  </g>
  
  <!-- Central AI Brain Icon -->
  <g transform="translate(600, 350)">
    <!-- Outer Rings -->
    <circle cx="0" cy="0" r="180" stroke="#7C3AED" stroke-width="2" stroke-opacity="0.3" fill="none"/>
    <circle cx="0" cy="0" r="150" stroke="#7C3AED" stroke-width="1" stroke-opacity="0.5" fill="none" stroke-dasharray="10 5"/>
    <circle cx="0" cy="0" r="120" stroke="#EC4899" stroke-width="2" stroke-opacity="0.4" fill="none"/>
    
    <!-- AI Brain Core -->
    <circle cx="0" cy="0" r="80" fill="url(#glow1)" filter="url(#blur2)"/>
    <circle cx="0" cy="0" r="60" fill="#1a1a3e" stroke="#7C3AED" stroke-width="3"/>
    
    <!-- Brain Circuit Lines -->
    <path d="M-40 -20 L-20 0 L-40 20" stroke="#7C3AED" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M40 -20 L20 0 L40 20" stroke="#EC4899" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M-20 -40 L0 -20 L20 -40" stroke="#3B82F6" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M-20 40 L0 20 L20 40" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" fill="none"/>
    
    <!-- Center Node -->
    <circle cx="0" cy="0" r="15" fill="#EC4899"/>
    <circle cx="0" cy="0" r="8" fill="#ffffff"/>
    
    <!-- Orbiting Dots -->
    <circle cx="0" cy="-120" r="6" fill="#7C3AED">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="10s" repeatCount="indefinite"/>
    </circle>
    <circle cx="85" cy="85" r="4" fill="#EC4899">
      <animateTransform attributeName="transform" type="rotate" from="120 0 0" to="480 0 0" dur="15s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-100" cy="50" r="5" fill="#3B82F6">
      <animateTransform attributeName="transform" type="rotate" from="240 0 0" to="600 0 0" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Enterprise Buildings -->
  <g transform="translate(200, 500)">
    <rect x="0" y="0" width="60" height="150" fill="#1e3a5f" stroke="#3B82F6" stroke-width="2" rx="4"/>
    <rect x="10" y="20" width="15" height="15" fill="#3B82F6" fill-opacity="0.5"/>
    <rect x="35" y="20" width="15" height="15" fill="#3B82F6" fill-opacity="0.5"/>
    <rect x="10" y="50" width="15" height="15" fill="#3B82F6" fill-opacity="0.5"/>
    <rect x="35" y="50" width="15" height="15" fill="#3B82F6" fill-opacity="0.5"/>
    <rect x="10" y="80" width="15" height="15" fill="#3B82F6" fill-opacity="0.5"/>
    <rect x="35" y="80" width="15" height="15" fill="#3B82F6" fill-opacity="0.5"/>
    
    <rect x="70" y="-30" width="50" height="180" fill="#1e3a5f" stroke="#7C3AED" stroke-width="2" rx="4"/>
    <rect x="80" y="-10" width="12" height="12" fill="#7C3AED" fill-opacity="0.5"/>
    <rect x="100" y="-10" width="12" height="12" fill="#7C3AED" fill-opacity="0.5"/>
    <rect x="80" y="15" width="12" height="12" fill="#7C3AED" fill-opacity="0.5"/>
    <rect x="100" y="15" width="12" height="12" fill="#7C3AED" fill-opacity="0.5"/>
    <rect x="80" y="40" width="12" height="12" fill="#7C3AED" fill-opacity="0.5"/>
    <rect x="100" y="40" width="12" height="12" fill="#7C3AED" fill-opacity="0.5"/>
    
    <rect x="130" y="20" width="55" height="130" fill="#1e3a5f" stroke="#EC4899" stroke-width="2" rx="4"/>
    <rect x="140" y="35" width="14" height="14" fill="#EC4899" fill-opacity="0.5"/>
    <rect x="162" y="35" width="14" height="14" fill="#EC4899" fill-opacity="0.5"/>
    <rect x="140" y="60" width="14" height="14" fill="#EC4899" fill-opacity="0.5"/>
    <rect x="162" y="60" width="14" height="14" fill="#EC4899" fill-opacity="0.5"/>
  </g>
  
  <!-- Server Racks -->
  <g transform="translate(850, 480)">
    <rect x="0" y="0" width="80" height="120" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="4"/>
    <rect x="10" y="15" width="60" height="8" fill="#48bb78" rx="2"/>
    <rect x="10" y="35" width="60" height="8" fill="#48bb78" rx="2"/>
    <rect x="10" y="55" width="60" height="8" fill="#ed8936" rx="2"/>
    <rect x="10" y="75" width="60" height="8" fill="#48bb78" rx="2"/>
    <rect x="10" y="95" width="60" height="8" fill="#4299e1" rx="2"/>
    
    <rect x="90" y="20" width="80" height="100" fill="#2d3748" stroke="#4a5568" stroke-width="2" rx="4"/>
    <rect x="100" y="32" width="60" height="8" fill="#4299e1" rx="2"/>
    <rect x="100" y="52" width="60" height="8" fill="#48bb78" rx="2"/>
    <rect x="100" y="72" width="60" height="8" fill="#48bb78" rx="2"/>
    <rect x="100" y="92" width="60" height="8" fill="#ed8936" rx="2"/>
  </g>
  
  <!-- Connection Lines -->
  <g stroke="#7C3AED" stroke-width="2" stroke-opacity="0.4" fill="none">
    <path d="M300 400 Q450 350 520 350" stroke-dasharray="5 5">
      <animate attributeName="stroke-dashoffset" from="0" to="20" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M900 450 Q750 400 680 380" stroke-dasharray="5 5">
      <animate attributeName="stroke-dashoffset" from="0" to="20" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Floating Elements -->
  <g>
    <rect x="150" y="200" width="40" height="40" fill="#7C3AED" fill-opacity="0.2" stroke="#7C3AED" stroke-width="1" rx="8">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="1000" y="300" width="30" height="30" fill="#EC4899" fill-opacity="0.2" stroke="#EC4899" stroke-width="1" rx="6">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,10; 0,0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <circle cx="200" y="600" r="8" fill="#3B82F6" fill-opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" y="500" r="6" fill="#8B5CF6" fill-opacity="0.5">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,12; 0,0" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Title Text -->
  <text x="600" y="650" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="bold" fill="#ffffff">AI Setup</text>
  <text x="600" y="700" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a0aec0">Enterprise Implementation</text>
  
  <!-- Decorative Lines -->
  <line x1="450" y1="660" x2="550" y2="660" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
  <line x1="650" y1="660" x2="750" y2="660" stroke="#7C3AED" stroke-width="3" stroke-linecap="round"/>
</svg>
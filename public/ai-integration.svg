<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1200" y2="800">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="300" y1="200" x2="600" y2="500">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="800" y1="100" x2="1100" y2="400">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="blur3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="30"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg2)"/>
  
  <!-- Ambient Glow -->
  <circle cx="400" cy="300" r="180" fill="url(#purpleGrad)" filter="url(#blur3)"/>
  <circle cx="900" cy="250" r="140" fill="url(#pinkGrad)" filter="url(#blur3)"/>
  
  <!-- Hexagon Pattern Background -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1" fill="none">
    <path d="M100 100 L130 55 L190 55 L220 100 L190 145 L130 145 Z"/>
    <path d="M220 100 L250 55 L310 55 L340 100 L310 145 L250 145 Z"/>
    <path d="M340 100 L370 55 L430 55 L460 100 L430 145 L370 145 Z"/>
    <path d="M160 190 L190 145 L250 145 L280 190 L250 235 L190 235 Z"/>
    <path d="M280 190 L310 145 L370 145 L400 190 L370 235 L310 235 Z"/>
    <path d="M400 190 L430 145 L490 145 L520 190 L490 235 L430 235 Z"/>
    <path d="M100 280 L130 235 L190 235 L220 280 L190 325 L130 325 Z"/>
    <path d="M220 280 L250 235 L310 235 L340 280 L310 325 L250 325 Z"/>
    <path d="M760 100 L790 55 L850 55 L880 100 L850 145 L790 145 Z"/>
    <path d="M880 100 L910 55 L970 55 L1000 100 L970 145 L910 145 Z"/>
    <path d="M1000 100 L1030 55 L1090 55 L1120 100 L1090 145 L1030 145 Z"/>
  </g>
  
  <!-- Central Browser Window -->
  <g transform="translate(600, 320)">
    <!-- Browser Frame -->
    <rect x="-250" y="-160" width="500" height="350" fill="#1e293b" stroke="#475569" stroke-width="2" rx="12"/>
    
    <!-- Browser Header -->
    <rect x="-250" y="-160" width="500" height="40" fill="#334155" rx="12"/>
    <rect x="-250" y="-130" width="500" height="10" fill="#334155"/>
    
    <!-- Browser Controls -->
    <circle cx="-220" cy="-140" r="6" fill="#ef4444"/>
    <circle cx="-200" cy="-140" r="6" fill="#f59e0b"/>
    <circle cx="-180" cy="-140" r="6" fill="#22c55e"/>
    
    <!-- Address Bar -->
    <rect x="-150" y="-150" width="380" height="24" fill="#1e293b" rx="6"/>
    <text x="-130" y="-133" font-family="system-ui" font-size="12" fill="#94a3b8">flowcreativ.com/ai-integration</text>
    
    <!-- Browser Content Area -->
    <rect x="-240" y="-110" width="480" height="290" fill="#0f172a" rx="4"/>
    
    <!-- AI Chat Interface -->
    <rect x="-220" y="-90" width="300" height="250" fill="#1e293b" rx="8"/>
    
    <!-- Chat Header -->
    <rect x="-220" y="-90" width="300" height="35" fill="#334155" rx="8"/>
    <circle cx="-200" cy="-72" r="8" fill="#8B5CF6"/>
    <text x="-185" y="-68" font-family="system-ui" font-size="11" fill="#ffffff" font-weight="600">AI Assistant</text>
    <circle cx="45" cy="-72" r="4" fill="#22c55e"/>
    
    <!-- Chat Messages -->
    <rect x="-210" y="-45" width="180" height="30" fill="#8B5CF6" rx="8"/>
    <text x="-195" y="-25" font-family="system-ui" font-size="10" fill="#ffffff">Halo! Ada yang bisa saya bantu?</text>
    
    <rect x="-50" y="-5" width="120" height="25" fill="#475569" rx="8"/>
    <text x="-40" y="12" font-family="system-ui" font-size="10" fill="#ffffff">Info AI dong</text>
    
    <rect x="-210" y="35" width="220" height="50" fill="#8B5CF6" rx="8"/>
    <text x="-200" y="55" font-family="system-ui" font-size="10" fill="#ffffff">Kami bisa bantu integrasi AI</text>
    <text x="-200" y="70" font-family="system-ui" font-size="10" fill="#ffffff">ke website Anda!</text>
    
    <!-- Chat Input -->
    <rect x="-210" y="100" width="300" height="35" fill="#334155" rx="6"/>
    <text x="-195" y="122" font-family="system-ui" font-size="11" fill="#64748b">Ketik pesan...</text>
    <circle cx="65" cy="117" r="12" fill="#8B5CF6"/>
    <path d="M62 117 L70 117 M66 113 L70 117 L66 121" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- AI Panel Right -->
    <rect x="100" y="-90" width="120" height="120" fill="#1e293b" stroke="#8B5CF6" stroke-width="1" rx="8"/>
    <text x="160" y="-70" text-anchor="middle" font-family="system-ui" font-size="11" fill="#8B5CF6" font-weight="600">AI Features</text>
    
    <rect x="115" y="-55" width="90" height="20" fill="#334155" rx="4"/>
    <text x="160" y="-41" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Chatbot</text>
    
    <rect x="115" y="-25" width="90" height="20" fill="#334155" rx="4"/>
    <text x="160" y="-11" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Analytics</text>
    
    <rect x="115" y="5" width="90" height="20" fill="#334155" rx="4"/>
    <text x="160" y="19" text-anchor="middle" font-family="system-ui" font-size="9" fill="#ffffff">Search</text>
    
    <!-- Stats Panel -->
    <rect x="100" y="45" width="120" height="115" fill="#1e293b" stroke="#3B82F6" stroke-width="1" rx="8"/>
    <text x="160" y="65" text-anchor="middle" font-family="system-ui" font-size="11" fill="#3B82F6" font-weight="600">Performance</text>
    
    <rect x="115" y="80" width="90" height="8" fill="#334155" rx="4"/>
    <rect x="115" y="80" width="75" height="8" fill="#3B82F6" rx="4"/>
    <text x="160" y="100" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8">Response: 95%</text>
    
    <rect x="115" y="110" width="90" height="8" fill="#334155" rx="4"/>
    <rect x="115" y="110" width="65" height="8" fill="#22c55e" rx="4"/>
    <text x="160" y="130" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8">Uptime: 99.9%</text>
    
    <rect x="115" y="140" width="90" height="8" fill="#334155" rx="4"/>
    <rect x="115" y="140" width="80" height="8" fill="#8B5CF6" rx="4"/>
    <text x="160" y="160" text-anchor="middle" font-family="system-ui" font-size="9" fill="#94a3b8">Satisfaction</text>
  </g>
  
  <!-- Connection Nodes -->
  <circle cx="200" cy="250" r="30" fill="#1e293b" stroke="#8B5CF6" stroke-width="2"/>
  <path d="M190 250 L205 240 L205 260 Z" fill="#8B5CF6"/>
  
  <circle cx="1000" cy="250" r="30" fill="#1e293b" stroke="#3B82F6" stroke-width="2"/>
  <rect x="990" y="240" width="20" height="20" fill="#3B82F6"/>
  
  <!-- Data Flow Lines -->
  <g stroke="#8B5CF6" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M230 250 Q400 200 350 250" stroke-opacity="0.5" stroke-dasharray="8 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-24" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M970 250 Q800 200 850 250" stroke-opacity="0.5" stroke-dasharray="8 4">
      <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Floating Icons -->
  <g>
    <!-- Code Icon -->
    <g transform="translate(150, 500)">
      <rect width="50" height="50" fill="#1e293b" stroke="#8B5CF6" stroke-width="1" rx="8">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="5s" repeatCount="indefinite"/>
      </rect>
      <path d="M15 25 L22 18 L22 32 Z" fill="#8B5CF6"/>
      <path d="M35 25 L28 18 L28 32 Z" fill="#8B5CF6"/>
    </g>
    
    <!-- Database Icon -->
    <g transform="translate(1000, 500)">
      <rect width="50" height="50" fill="#1e293b" stroke="#3B82F6" stroke-width="1" rx="8">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,15; 0,0" dur="4s" repeatCount="indefinite"/>
      </rect>
      <ellipse cx="25" cy="15" rx="12" ry="6" fill="#3B82F6"/>
      <path d="M13 15 L13 35 Q25 41 37 35 L37 15" stroke="#3B82F6" stroke-width="2" fill="none"/>
    </g>
    
    <!-- API Icon -->
    <g transform="translate(150, 150)">
      <circle r="25" fill="#1e293b" stroke="#EC4899" stroke-width="1">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,10; 0,0" dur="3s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="5" text-anchor="middle" font-family="system-ui" font-size="12" fill="#EC4899" font-weight="bold">API</text>
    </g>
    
    <!-- Cloud Icon -->
    <g transform="translate(1000, 150)">
      <circle r="25" fill="#1e293b" stroke="#22c55e" stroke-width="1">
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="4s" repeatCount="indefinite"/>
      </circle>
      <path d="M-10 5 Q-10 -5 0 -5 Q5 -15 15 -10 Q20 -15 25 -5 Q35 -5 35 5 Q35 15 25 15 L-5 15 Q-15 15 -10 5" fill="#22c55e"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="600" y="680" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="bold" fill="#ffffff">AI Integration</text>
  <text x="600" y="730" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#94a3b8">Smart Website Solutions</text>
  
  <!-- Decorative Elements -->
  <line x1="400" y1="695" x2="500" y2="695" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
  <line x1="700" y1="695" x2="800" y2="695" stroke="#8B5CF6" stroke-width="3" stroke-linecap="round"/>
</svg>